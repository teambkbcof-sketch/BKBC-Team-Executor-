<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BKBC Team Executor</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body { background: #050505; color: white; font-family: monospace; text-align: center; margin: 0; padding: 20px; }
    .header img { width: 120px; border-radius: 15px; border: 2px solid #ff0000; box-shadow: 0 0 15px #ff0000; }
    h2 { color: #ff0000; letter-spacing: 2px; }
    textarea { width: 100%; height: 250px; background: #111; color: #00ff00; border: 1px solid #ff0000; border-radius: 8px; padding: 10px; font-size: 14px; outline: none; box-sizing: border-box; }
    .btns { margin-top: 15px; display: flex; gap: 10px; justify-content: center; }
    button { padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
    .exec { background: #ff0000; color: white; }
    .clear { background: #333; color: white; }
    button:hover { transform: scale(1.05); opacity: 0.8; }
  </style>
</head>
<body>

  <div class="header">
    <img src="https://ibb.co/gZrV71hc" alt="BKBC Logo">
    <h2>BKBC TEAM EXECUTOR</h2>
  </div>

  <textarea id="editor" placeholder="-- Skriptinizi bura yazın..."></textarea>

  <div class="btns">
    <button class="exec" onclick="execute()">EXECUTE</button>
    <button class="clear" onclick="document.getElementById('editor').value = ''">CLEAR</button>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }

    function execute() {
      const code = document.getElementById('editor').value;
      if(!code) { alert("Xəta: Skript boşdur!"); return; }
      
      const blob = new Blob([code], {type: 'text/plain'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'BKBC_Script.lua';
      a.click();
    }
  </script>
</body>
</html>
